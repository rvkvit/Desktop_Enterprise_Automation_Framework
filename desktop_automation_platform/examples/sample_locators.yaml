# =============================================================================
# Desktop Automation Platform — Sample Locator Repository
# =============================================================================
# This file defines all UI element locators for the Claims Desktop application.
#
# FORMAT PER ELEMENT
# ------------------
#   ELEMENT_NAME:
#     primary:
#       strategy: <strategy>   # automation_id | name | class_name |
#                              # control_type | xpath | image |
#                              # css_selector | text | partial_text
#       value: <value>
#       timeout: 15            # optional — overrides framework default
#       index: 0               # optional — select Nth match (0-based)
#     fallbacks:               # optional — tried in order if primary fails
#       - strategy: name
#         value: Login
#       - strategy: image
#         value: login_button.png
#     scope: PARENT_LOCATOR    # optional — search within parent element
#
# NAMING CONVENTIONS
# ------------------
# Use UPPER_SNAKE_CASE.  Group by screen/panel using comments.
# Keep automation_id as primary when available — it is the most stable.
# =============================================================================

# =============================================================================
# LOGIN SCREEN
# =============================================================================

LOGIN_USERNAME_FIELD:
  primary:
    strategy: automation_id
    value: txtUsername
    timeout: 10
  fallbacks:
    - strategy: name
      value: Username
    - strategy: class_name
      value: TextBox

LOGIN_PASSWORD_FIELD:
  primary:
    strategy: automation_id
    value: txtPassword
  fallbacks:
    - strategy: name
      value: Password
    - strategy: class_name
      value: PasswordBox

LOGIN_BUTTON:
  primary:
    strategy: automation_id
    value: btnLogin
  fallbacks:
    - strategy: name
      value: Login
    - strategy: name
      value: Sign In
    - strategy: image
      value: login_button.png
      # Image template used as last resort (Citrix / slow rendering)

LOGIN_FORGOT_PASSWORD_LINK:
  primary:
    strategy: name
    value: Forgot Password?
  fallbacks:
    - strategy: partial_text
      value: Forgot

LOGIN_ERROR_MESSAGE:
  primary:
    strategy: automation_id
    value: lblLoginError
  fallbacks:
    - strategy: name
      value: Invalid credentials

